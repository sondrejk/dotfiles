# Theme — run `kitty +kitten themes` and pick Gruvbox Dark to apply

# Font
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto

# Cursor trail
cursor_trail 3
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2

# Tab bar
tab_bar_style    powerline
tab_bar_min_tabs 2

# Always launch zsh, regardless of $SHELL/passwd — kitty otherwise caches
# the shell it saw at its own startup, so a chsh done after kitty was last
# launched wouldn't take effect until a full kitty restart.
shell zsh

# Shell integration (copies terminfo to remote, enables image protocol, etc.)
shell_integration enabled



# BEGIN_KITTY_THEME
# Gruvbox Material Dark Hard
include current-theme.conf
# END_KITTY_THEME